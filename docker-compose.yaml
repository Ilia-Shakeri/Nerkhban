version: '3.9'
services:
  backend:
    build:
      context: ./backend
    container_name: nerkhban-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://nerkhban:nerkhban@postgres:5432/nerkhban
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      # Optional: set this if you want Persian Toman source from Alanchand.
      ALANCHAND_API_TOKEN: ${ALANCHAND_API_TOKEN:-}
    ports:
      - '8000:8000'

  postgres:
    image: postgres:16-alpine
    container_name: nerkhban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nerkhban
      POSTGRES_USER: nerkhban
      POSTGRES_PASSWORD: nerkhban
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nerkhban -d nerkhban']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
